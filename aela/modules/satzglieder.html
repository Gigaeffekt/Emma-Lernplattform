<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satzglieder – Aelas Wortpferd</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
:root{
  --pink:#c2185b;--pink-dark:#880e4f;--pink-light:#fce4ec;--pink-mid:#f48fb1;
  --purple:#7b1fa2;--purple-light:#f3e5f5;--gold:#f9a825;--gold-dark:#e65100;
  --green:#2e7d32;--green-light:#e8f5e9;--red:#c62828;--red-light:#ffebee;
  --blue:#1565c0;--blue-light:#e3f2fd;--teal:#00695c;--teal-light:#e0f2f1;
  --text:#1a0a2e;--text-soft:#5d4e75;--bg:#fff8fc;--surface:#ffffff;
  --border:#f48fb1;--radius:20px;--radius-sm:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:18px;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.55;}

header{background:linear-gradient(135deg,var(--pink-dark),var(--purple));color:#fff;padding:0 18px;height:68px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 3px 14px rgba(136,14,79,.4);}
.nav-back{color:#fff;text-decoration:none;font-size:1.1rem;font-weight:900;background:rgba(255,255,255,.2);padding:9px 16px;border-radius:30px;}
.h-title{font-size:1.3rem;font-weight:900;flex:1;}
.h-xp{font-size:1rem;font-weight:900;background:rgba(249,168,37,.3);padding:6px 12px;border-radius:30px;white-space:nowrap;}

main{max-width:760px;margin:0 auto;padding:22px 16px 80px;}

.wolke-strip{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,var(--pink-light),var(--purple-light));border:3px solid var(--pink-mid);border-radius:var(--radius);padding:16px 20px;margin-bottom:22px;}
.ws-horse{font-size:3.5rem;flex-shrink:0;}
.ws-horse.happy{animation:horse-happy .55s ease;}
@keyframes horse-happy{0%,100%{transform:scale(1)rotate(0)}30%{transform:scale(1.3)rotate(-12deg)translateY(-8px)}65%{transform:scale(1.15)rotate(8deg)translateY(-4px)}}
.ws-msg{font-size:1.05rem;color:var(--text-soft);}
.ws-msg strong{color:var(--pink-dark);font-size:1.15rem;}

.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:1rem;color:var(--text-soft);font-weight:700;}
.prog-bar-bg{background:#f0e4f8;border-radius:30px;height:16px;overflow:hidden;border:2px solid var(--border);margin-bottom:22px;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:30px;transition:width .5s ease;}

.task-card{background:var(--surface);border:3px solid var(--border);border-radius:var(--radius);padding:26px 22px;margin-bottom:22px;}
.task-label{font-size:.9rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--pink-dark);margin-bottom:8px;}
.task-question{font-size:1.3rem;font-weight:800;color:var(--text);line-height:1.6;margin-bottom:20px;}
.tts-btn{background:var(--purple);color:#fff;border:none;border-radius:30px;padding:9px 18px;font-size:.95rem;font-weight:900;font-family:inherit;cursor:pointer;margin-bottom:18px;margin-right:8px;transition:transform .12s;}
.tts-btn.slow{background:var(--text-soft);}

/* SENTENCE HIGHLIGHTER */
.sent-display{font-size:1.5rem;font-weight:800;text-align:center;line-height:2.8;padding:14px;background:var(--pink-light);border:3px solid var(--pink-mid);border-radius:var(--radius-sm);margin-bottom:14px;cursor:default;}
.sw{display:inline-block;padding:4px 10px;border-radius:8px;margin:3px;cursor:pointer;transition:all .2s;border:2px solid transparent;user-select:none;}
.sw:hover{background:var(--purple-light);border-color:var(--purple);}
.sw.S{background:#e3f2fd;border-color:#1565c0;color:#1565c0;font-weight:900;}
.sw.P{background:#e8f5e9;border-color:#2e7d32;color:#2e7d32;font-weight:900;}
.sw.O{background:#fff3e0;border-color:#e65100;color:#e65100;font-weight:900;}
.sw.correct{outline:4px solid var(--green);outline-offset:2px;}
.sw.wrong{outline:4px solid var(--red);outline-offset:2px;}

/* SATZGLIED LEGEND */
.sg-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.sg-btn{padding:10px 18px;border-radius:30px;font-size:1rem;font-weight:900;cursor:pointer;border:3px solid transparent;font-family:inherit;transition:transform .1s;}
.sg-btn.S{background:#e3f2fd;color:#1565c0;border-color:#1565c0;}
.sg-btn.P{background:#e8f5e9;color:#2e7d32;border-color:#2e7d32;}
.sg-btn.O{background:#fff3e0;color:#e65100;border-color:#e65100;}
.sg-btn.active{color:#fff!important;}
.sg-btn.S.active{background:#1565c0;}
.sg-btn.P.active{background:#2e7d32;}
.sg-btn.O.active{background:#e65100;}
.sg-btn:hover{transform:scale(1.06);}

/* MC */
.options-list{display:flex;flex-direction:column;gap:12px;}
.opt-btn{background:var(--bg);border:3px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px;font-size:1.1rem;font-weight:700;font-family:inherit;color:var(--text);cursor:pointer;text-align:left;transition:border-color .15s,background .15s,transform .1s;min-height:56px;}
.opt-btn:hover:not(:disabled){border-color:var(--pink);background:var(--pink-light);transform:translateX(4px);}
.opt-btn.selected{border-color:var(--pink);background:var(--pink-light);}
.opt-btn.correct{border-color:var(--green);background:var(--green-light);color:var(--green);pointer-events:none;}
.opt-btn.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);pointer-events:none;}
.opt-btn:disabled:not(.correct):not(.wrong){opacity:.5;}

/* PUZZLE */
.word-slots{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;min-height:58px;padding:12px;background:#f5f0fa;border:3px dashed var(--border);border-radius:var(--radius-sm);margin-bottom:14px;}
.word-bank{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:14px;background:var(--bg);border:2px solid var(--border);border-radius:var(--radius-sm);}
.word-chip{background:var(--surface);border:3px solid var(--pink-mid);border-radius:30px;padding:10px 18px;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .12s,background .12s;user-select:none;}
.word-chip:hover{background:var(--pink-light);transform:scale(1.07);}
.word-chip.placed{background:var(--purple-light);border-color:var(--purple);}
.sentence-display{font-size:1.4rem;font-weight:900;color:var(--pink-dark);text-align:center;min-height:52px;padding:12px;background:var(--pink-light);border:3px solid var(--pink-mid);border-radius:var(--radius-sm);margin-bottom:14px;}

.feedback-box{border-radius:var(--radius-sm);padding:16px 18px;margin-top:16px;font-size:1.05rem;font-weight:700;display:none;}
.feedback-box.correct{display:block;background:var(--green-light);border:3px solid var(--green);color:var(--green);}
.feedback-box.wrong{display:block;background:var(--red-light);border:3px solid var(--red);color:var(--red);}

.nav-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:22px;}
.btn-check{flex:2;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:14px;padding:16px 20px;font-size:1.1rem;font-weight:900;font-family:inherit;cursor:pointer;transition:transform .12s;min-height:56px;}
.btn-check:hover{transform:scale(1.03);}
.btn-next{flex:1;background:var(--purple);color:#fff;border:none;border-radius:14px;padding:16px 20px;font-size:1.1rem;font-weight:900;font-family:inherit;cursor:pointer;display:none;min-height:56px;}

.finish-screen{display:none;text-align:center;padding:40px 20px;}
.finish-screen.show{display:block;}
.finish-trophy{font-size:5rem;display:block;margin-bottom:12px;}
.finish-title{font-size:2rem;font-weight:900;color:var(--pink-dark);margin-bottom:8px;}
.finish-xp{font-size:1.5rem;font-weight:900;color:var(--gold-dark);margin-bottom:20px;}
.finish-stars{font-size:2.5rem;color:var(--gold);letter-spacing:8px;margin-bottom:28px;}
.btn-finish{display:inline-block;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;text-decoration:none;border-radius:14px;padding:16px 32px;font-size:1.1rem;font-weight:900;margin:6px;border:none;cursor:pointer;font-family:inherit;}

/* INFO TABLE */
.info-table{width:100%;border-collapse:collapse;margin-bottom:18px;}
.info-table th{padding:10px 14px;text-align:left;border-bottom:3px solid var(--border);font-weight:900;font-size:1rem;}
.info-table td{padding:10px 14px;border-bottom:1px solid #f5e4f5;font-size:1rem;}

@media(max-width:540px){main{padding:14px 12px 60px;}.task-question{font-size:1.1rem;}.sw{font-size:1.1rem;}}
</style>
</head>
<body>

<header>
  <a class="nav-back" href="../index.html">← Zurück</a>
  <span class="h-title">🔗 Satzglieder</span>
  <span class="h-xp" id="h-xp">⭐ 0 XP</span>
</header>

<main>
  <div class="wolke-strip">
    <span class="ws-horse" id="wolke">🐴</span>
    <div class="ws-msg"><strong id="wolke-title">Satzglieder entdecken!</strong><br><span id="wolke-hint">Wer? Tut was? Mit wem?</span></div>
  </div>

  <div class="prog-row">
    <span>Aufgabe <strong id="task-num">1</strong> von <strong id="task-total">8</strong></span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="prog-bar-bg"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>

  <div id="task-area"></div>

  <div class="finish-screen" id="finish">
    <span class="finish-trophy">🏆</span>
    <div class="finish-title">Satzglieder-Meisterin!</div>
    <div class="finish-xp" id="fin-xp">+150 XP</div>
    <div class="finish-stars" id="fin-stars">★★★</div>
    <p style="font-size:1.1rem;color:var(--text-soft);margin-bottom:28px">Wolke galoppiert vor Freude!</p>
    <a class="btn-finish" href="../index.html">🏠 Zur Startseite</a>
    <button class="btn-finish" onclick="restartModule()">🔁 Nochmal</button>
  </div>
</main>

<script>
const NS='aela_';
function gs(k){try{return JSON.parse(localStorage.getItem(NS+k));}catch(e){return null;}}
function ss(k,v){try{localStorage.setItem(NS+k,JSON.stringify(v));}catch(e){}}
function speak(text,rate){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';u.rate=rate||(gs('tts_rate')||0.8);u.pitch=1.1;speechSynthesis.speak(u);}
function addXP(pts){const p=gs('progress')||{xp:0};p.xp=(p.xp||0)+pts;ss('progress',p);}
function getTotalXP(){return(gs('progress')||{xp:0}).xp;}
function shootConfetti(){if(typeof confetti!=='undefined'){confetti({particleCount:120,spread:80,origin:{y:.6},colors:['#c2185b','#7b1fa2','#f9a825','#2e7d32']});}}
function wolkeHappy(){const el=document.getElementById('wolke');el.classList.remove('happy');void el.offsetWidth;el.classList.add('happy');setTimeout(()=>el.classList.remove('happy'),700);}
function wolkeMsg(t,h){document.getElementById('wolke-title').textContent=t;document.getElementById('wolke-hint').textContent=h;}

const TASKS=[
  {
    id:1,type:'info',
    label:'Erklärung – Was sind Satzglieder?',
    question:'Ein Satz hat 3 wichtige Teile:\n\n🔵 SUBJEKT = Wer oder was? (die Person/das Ding das etwas tut)\n🟢 PRÄDIKAT = Was tut es? (immer ein Verb!)\n🟠 OBJEKT = Wen oder was? (das Ziel der Handlung)',
    table:[
      {sg:'🔵 Subjekt',frage:'Wer? Was?',beispiel:'Die Katze schläft.','tipp':'Meist am Satzanfang'},
      {sg:'🟢 Prädikat',frage:'Was tut es?',beispiel:'Die Katze SCHLÄFT.','tipp':'Immer ein Verb!'},
      {sg:'🟠 Objekt',frage:'Wen? Was?',beispiel:'Sie liebt DEN HUND.','tipp':'Nach dem Verb'},
    ],
    feedback_ok:'Super! Jetzt üben wir!',feedback_err:''
  },
  {
    id:2,type:'mc',
    label:'Aufgabe 1 – Subjekt finden',
    question:'„Der Hund bellt laut."\nWelches Wort ist das SUBJEKT (Wer bellt)?',
    options:['bellt','laut','Der Hund','laut bellt'],
    correct:2,
    feedback_ok:'"Der Hund" ist das Subjekt – er ist derjenige der bellt!',
    feedback_err:'Das Subjekt antwortet auf die Frage: WER bellt? → Der Hund!'
  },
  {
    id:3,type:'mc',
    label:'Aufgabe 2 – Prädikat finden',
    question:'„Das Kind malt ein Bild."\nWelches Wort ist das PRÄDIKAT (Was tut das Kind)?',
    options:['Das Kind','ein Bild','schön','malt'],
    correct:3,
    feedback_ok:'"malt" ist das Prädikat – es ist das Verb, die Tätigkeit!',
    feedback_err:'Das Prädikat ist immer ein VERB. "malt" beschreibt was das Kind tut!'
  },
  {
    id:4,type:'mc',
    label:'Aufgabe 3 – Objekt finden',
    question:'„Aela liebt ihr Pferd."\nWelches Wort ist das OBJEKT (Wen/was liebt Aela)?',
    options:['Aela','liebt','ihr Pferd','sehr'],
    correct:2,
    feedback_ok:'"ihr Pferd" ist das Objekt – es ist das WAS Aela liebt!',
    feedback_err:'Das Objekt antwortet auf WEN oder WAS. Aela liebt WAS? → ihr Pferd!'
  },
  {
    id:5,type:'highlight',
    label:'Aufgabe 4 – Satzglieder markieren',
    question:'Markiere im Satz alle Satzglieder!\n🔵 Tippe auf SUBJEKT → dann das Wort\n🟢 Tippe auf PRÄDIKAT → dann das Wort',
    sentence:'Die Schülerin schreibt einen Brief.',
    words:[
      {w:'Die',   correct:''},
      {w:'Schülerin',correct:'S'},
      {w:'schreibt',correct:'P'},
      {w:'einen', correct:''},
      {w:'Brief.',correct:'O'},
    ],
    feedback_ok:'Perfekt! Schülerin=Subjekt, schreibt=Prädikat, Brief=Objekt!',
    feedback_err:'Schülerin ist wer? → Subjekt. schreibt ist was tut sie? → Prädikat. Brief ist was? → Objekt!'
  },
  {
    id:6,type:'mc',
    label:'Aufgabe 5 – Satzfrage stellen',
    question:'Mit welcher Frage findet man das PRÄDIKAT?',
    options:['Wer oder was?','Was tut jemand?','Wen oder was?','Wann passiert es?'],
    correct:1,
    feedback_ok:'Genau! Das Prädikat antwortet auf: Was tut jemand?',
    feedback_err:'Das Prädikat = Verb = Tätigkeit. Frage: Was tut die Person?'
  },
  {
    id:7,type:'puzzle',
    label:'Aufgabe 6 – Satz bauen',
    question:'Baue einen richtigen Satz! Tippe die Wörter in der richtigen Reihenfolge.',
    words:['Wolke','galoppiert','über','die','Wiese','.'],
    correct_sentence:'Wolke galoppiert über die Wiese.',
    feedback_ok:'Wunderbar! Wolke=Subjekt, galoppiert=Prädikat – perfekter Satz!',
    feedback_err:'Satzanfang = Subjekt (Wolke), dann Prädikat (galoppiert), dann der Rest.'
  },
  {
    id:8,type:'mc',
    label:'Aufgabe 7 – Alles zusammen',
    question:'„Meine Freundin kauft ein neues Buch."\n\nWelches Satzglied ist „kauft"?',
    options:['Subjekt – Wer kauft?','Prädikat – Was tut sie?','Objekt – Was kauft sie?','kein Satzglied'],
    correct:1,
    feedback_ok:'Perfekt! "kauft" = Prädikat. Es sagt was meine Freundin TUT.',
    feedback_err'"kauft" ist ein Verb → immer das Prädikat!'
  }
];

let currentIdx=0,score=0,selectedOpt_=null,tagActive2=null;
const tagState2={};
let puzzlePlaced2=[];

function renderTask(){
  const t=TASKS[currentIdx];
  document.getElementById('task-num').textContent=currentIdx+1;
  document.getElementById('task-total').textContent=TASKS.length;
  const pct=Math.round(currentIdx/TASKS.length*100);
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  const area=document.getElementById('task-area');
  area.innerHTML='';
  area.appendChild(buildHTML(t));
  setTimeout(()=>speak(t.question.replace(/\n/g,' ')),400);
}

function buildHTML(t){
  const wrap=document.createElement('div');
  const card=document.createElement('div');
  card.className='task-card';

  let inner=`<div class="task-label">${t.label}</div>
    <div class="task-question">${t.question.replace(/\n/g,'<br>')}</div>
    <button class="tts-btn" onclick="speak(TASKS[${currentIdx}].question.replace(/\\n/g,' '))">🔊 Vorlesen</button>
    <button class="tts-btn slow" onclick="speak(TASKS[${currentIdx}].question.replace(/\\n/g,' '),0.4)">🐌 Langsam</button>`;

  if(t.type==='info' && t.table){
    inner+=`<table class="info-table"><tr><th>Satzglied</th><th>Frage</th><th>Beispiel</th><th>Tipp</th></tr>`;
    t.table.forEach(r=>{inner+=`<tr><td><strong>${r.sg}</strong></td><td>${r.frage}</td><td>${r.beispiel}</td><td>${r.tipp}</td></tr>`;});
    inner+=`</table>`;
  }

  inner+=`<div id="exercise-area"></div><div class="feedback-box" id="feedback"></div>`;
  card.innerHTML=inner;
  wrap.appendChild(card);

  const nav=document.createElement('div');
  nav.className='nav-row';
  if(t.type==='info'){
    nav.innerHTML=`<button class="btn-next" id="btn-next" style="display:block;flex:1" onclick="nextTask()">Verstanden! →</button>`;
  } else {
    nav.innerHTML=`<button class="btn-check" id="btn-check" onclick="checkAnswer()">✅ Prüfen</button>
      <button class="btn-next" id="btn-next" onclick="nextTask()">Weiter →</button>`;
  }
  wrap.appendChild(nav);
  setTimeout(()=>buildExercise(t),0);
  return wrap;
}

function buildExercise(t){
  const area=document.getElementById('exercise-area');
  if(!area) return;

  if(t.type==='mc'){
    const ul=document.createElement('div');ul.className='options-list';
    t.options.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='opt-btn';btn.id='opt-'+i;btn.textContent=opt;
      btn.onclick=()=>selectOpt(i,t.options.length);
      ul.appendChild(btn);
    });
    area.appendChild(ul);
  }

  if(t.type==='highlight'){
    tagActive2=null;
    const leg=document.createElement('div');leg.className='sg-legend';
    leg.innerHTML=`
      <button class="sg-btn S" id="sg-S" onclick="setTag('S')">🔵 Subjekt</button>
      <button class="sg-btn P" id="sg-P" onclick="setTag('P')">🟢 Prädikat</button>
      <button class="sg-btn O" id="sg-O" onclick="setTag('O')">🟠 Objekt</button>
      <button class="sg-btn" style="background:#f5f5f5;border-color:#ccc;color:#666" onclick="setTag(null)">✖ Aus</button>`;
    area.appendChild(leg);
    const sentDiv=document.createElement('div');sentDiv.className='sent-display';
    t.words.forEach((wd,i)=>{
      const span=document.createElement('button');
      span.className='sw';span.id='sw-'+i;span.textContent=wd.w;
      if(!wd.correct){span.style.opacity='.55';span.style.cursor='default';}
      else {span.onclick=()=>{if(tagActive2) applyTag2(i,tagActive2);};}
      sentDiv.appendChild(span);
    });
    area.appendChild(sentDiv);
    const hint=document.createElement('p');
    hint.style.cssText='color:var(--text-soft);font-size:.95rem;text-align:center;';
    hint.textContent='Wähle zuerst eine Farbe, dann tippe das Wort!';
    area.appendChild(hint);
  }

  if(t.type==='puzzle'){
    puzzlePlaced2=[];
    const display=document.createElement('div');display.className='sentence-display';display.id='sd2';display.textContent='...';
    const slots=document.createElement('div');slots.className='word-slots';slots.id='ws2';
    const bank=document.createElement('div');bank.className='word-bank';bank.id='wb2';

    const shuffle=arr=>arr.sort(()=>Math.random()-.5);
    shuffle([...t.words]).forEach((w,i)=>{
      const chip=document.createElement('button');
      chip.className='word-chip';chip.id='pchip-'+i;chip.textContent=w;chip.dataset.word=w;chip.dataset.idx=i;
      chip.onclick=()=>placeWord2(chip);
      bank.appendChild(chip);
    });

    const hint2=document.createElement('p');
    hint2.style.cssText='text-align:center;color:var(--text-soft);font-size:.95rem;margin-bottom:8px;';
    hint2.textContent='↑ Dein Satz. ↓ Wähle die Wörter in richtiger Reihenfolge!';

    const clearBtn=document.createElement('button');
    clearBtn.className='tts-btn slow';clearBtn.style.cssText='margin-top:10px;';
    clearBtn.textContent='🗑 Löschen';clearBtn.onclick=clearPuzzle2;

    area.appendChild(display);
    area.appendChild(hint2);
    area.appendChild(slots);
    area.appendChild(bank);
    area.appendChild(clearBtn);
  }
}

function setTag(mode){
  tagActive2=mode;
  ['S','P','O'].forEach(m=>{
    const el=document.getElementById('sg-'+m);if(!el)return;
    el.className='sg-btn '+m+(mode===m?' active':'');
  });
}
function applyTag2(i,mode){
  tagState2[i]=mode;
  const el=document.getElementById('sw-'+i);
  el.className='sw '+mode;
}

function placeWord2(chip){
  if(chip.classList.contains('placed')){
    chip.classList.remove('placed');
    document.getElementById('wb2').appendChild(chip);
  } else {
    chip.classList.add('placed');
    document.getElementById('ws2').appendChild(chip);
  }
  updateDisplay2();
}
function updateDisplay2(){
  const words=[...document.getElementById('ws2').querySelectorAll('.word-chip')].map(c=>c.dataset.word);
  document.getElementById('sd2').textContent=words.length?words.join(' '):'...';
}
function clearPuzzle2(){
  const bank=document.getElementById('wb2');
  document.querySelectorAll('#ws2 .word-chip').forEach(c=>{c.classList.remove('placed');bank.appendChild(c);});
  updateDisplay2();
}

function selectOpt(i,total){selectedOpt_=i;for(let j=0;j<total;j++){document.getElementById('opt-'+j).classList.toggle('selected',j===i);}}

function checkAnswer(){
  const t=TASKS[currentIdx];
  let isCorrect=false;

  if(t.type==='mc'){
    if(selectedOpt_===null){speak('Wähle bitte eine Antwort!');return;}
    isCorrect=selectedOpt_===t.correct;
    for(let i=0;i<t.options.length;i++){
      const b=document.getElementById('opt-'+i);b.disabled=true;
      if(i===t.correct) b.classList.add('correct');
      else if(i===selectedOpt_&&!isCorrect) b.classList.add('wrong');
    }
    selectedOpt_=null;
  }

  if(t.type==='highlight'){
    const target=t.words.filter(w=>w.correct);
    isCorrect=target.every(w=>{const i=t.words.indexOf(w);return tagState2[i]===w.correct;});
    t.words.forEach((w,i)=>{
      if(!w.correct) return;
      const el=document.getElementById('sw-'+i);
      if(tagState2[i]===w.correct) el.classList.add('correct');
      else if(tagState2[i]) el.classList.add('wrong');
    });
  }

  if(t.type==='puzzle'){
    const placedWords=[...document.getElementById('ws2').querySelectorAll('.word-chip')].map(c=>c.dataset.word);
    const sentence=placedWords.join(' ');
    const clean=s=>s.replace(/\s*\.$/,'').trim().toLowerCase();
    isCorrect=clean(sentence)===clean(t.correct_sentence);
    if(!isCorrect&&placedWords.length<t.words.length-1){speak('Lege alle Wörter in den Satz!');return;}
  }

  showFeedback(isCorrect,t);
}

function showFeedback(isCorrect,t){
  const fb=document.getElementById('feedback');
  fb.className='feedback-box '+(isCorrect?'correct':'wrong');
  fb.textContent=isCorrect?('✅ '+t.feedback_ok):('❌ '+t.feedback_err);
  document.getElementById('btn-check').style.display='none';
  document.getElementById('btn-next').style.display='block';
  if(isCorrect){score++;addXP(20);wolkeHappy();speak(t.feedback_ok);if(score>=3)shootConfetti();}
  else{speak(t.feedback_err,0.7);}
  document.getElementById('h-xp').textContent='⭐ '+getTotalXP()+' XP';
}

function nextTask(){
  currentIdx++;selectedOpt_=null;tagActive2=null;
  Object.keys(tagState2).forEach(k=>delete tagState2[k]);
  if(currentIdx>=TASKS.length) finishModule();
  else renderTask();
}

function finishModule(){
  document.getElementById('prog-bar').style.width='100%';
  document.getElementById('task-area').style.display='none';
  document.getElementById('finish').classList.add('show');
  const pct=Math.round(score/TASKS.length*100);
  const stars=pct>=85?3:pct>=55?2:1;
  const xp=50+score*15;
  document.getElementById('fin-xp').textContent='+'+xp+' XP';
  document.getElementById('fin-stars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
  addXP(xp);
  const p=gs('progress')||{};if(!p.modules)p.modules={};
  p.modules.satzglieder={done:true,stars,score:pct};ss('progress',p);
  speak('Herzlichen Glückwunsch! Du kennst jetzt alle Satzglieder!');
  setTimeout(()=>{shootConfetti();shootConfetti();},500);setTimeout(shootConfetti,1200);
}

function restartModule(){
  currentIdx=0;score=0;selectedOpt_=null;tagActive2=null;
  document.getElementById('task-area').style.display='';
  document.getElementById('finish').classList.remove('show');
  renderTask();
}

document.getElementById('h-xp').textContent='⭐ '+getTotalXP()+' XP';
renderTask();
</script>
</body>
</html>
