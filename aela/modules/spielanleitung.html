<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spielanleitung & Gedicht - Aela's Deutschkurs</title>
  <link rel="stylesheet" href="http://localhost/tools/css/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/aela-main.css">
  <style>
    .exercise-nav { display: flex; gap: 20px; justify-content: space-between; margin: 40px 0; }
    .progress-bar { width: 100%; height: 50px; background-color: #f0f0f0; border: 3px solid black; border-radius: 8px; overflow: hidden; margin: 20px 0; }
    .progress-fill { height: 100%; background-color: #0066cc; width: 0%; transition: width 0.3s ease; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 28px; }
    .task-counter { font-size: 40px; text-align: center; margin: 20px 0; }
  </style>
</head>
<body>
  <header>
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1>✨ Spielanleitung & Gedicht</h1>
      <a href="../" class="btn btn-secondary">← Zurück</a>
    </div>
  </header>

  <main class="container">
    <div class="task-counter">Aufgabe <span id="current-task">1</span> von <span id="total-tasks">3</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill">0%</div></div>
    <div id="exercise-container" class="task-container"><p style="font-size: 44px; text-align: center;">⏳ Lädt Aufgabe...</p></div>
    <div class="exercise-nav">
      <button class="btn btn-secondary" id="prev-btn" onclick="previousExercise()" disabled>← Zurück</button>
      <button class="btn btn-primary" id="next-btn" onclick="nextExercise()" disabled>Weiter →</button>
    </div>
    <div class="info" style="text-align: center; margin-top: 40px;">
      <p>✍️ <strong>Kreativitäts-Modul!</strong></p>
      <p>Es gibt keine falschen Antworten - schreib was du denkst!</p>
    </div>
  </main>

  <footer><p>Deine Kreativität ist wertvoll! 🎨✨</p></footer>

  <script src="http://localhost/tools/js/axios/axios.min.js"></script>
  <script src="../assets/js/core.js"></script>
  <script src="../assets/js/tts.js"></script>
  <script src="../assets/js/qrcode-gen.js"></script>
  <script src="../assets/js/exercises.js"></script>

  <script>
    let tasks = [];
    let currentTaskIndex = 0;
    let exerciseScores = [];

    async function loadTasks() {
      try {
        const response = await fetch('../data/spielanleitung.json');
        const data = await response.json();
        tasks = data.tasks;
        document.getElementById('total-tasks').textContent = tasks.length;
        if (tasks.length > 0) loadTask(0);
      } catch (error) {
        console.error('Fehler:', error);
        document.getElementById('exercise-container').innerHTML = '<p class="error">❌ Fehler!</p>';
      }
    }

    function loadTask(index) {
      if (index < 0 || index >= tasks.length) return;
      currentTaskIndex = index;
      const task = tasks[index];
      document.getElementById('current-task').textContent = index + 1;
      updateProgressBar();

      const exercise = new TextInputExercise(task);
      currentExercise = exercise;
      document.getElementById('exercise-container').innerHTML = exercise.render();
      exercise.startTimer();
      setTimeout(() => aelaTTS.speak(task.question), 500);
      document.getElementById('prev-btn').disabled = index === 0;
      document.getElementById('next-btn').disabled = true;
    }

    function updateProgressBar() {
      const p = Math.round((currentTaskIndex / tasks.length) * 100);
      document.getElementById('progress-fill').style.width = p + '%';
      document.getElementById('progress-fill').textContent = p + '%';
    }

    function showFeedback() {
      const c = document.getElementById('feedback-container');
      currentExercise.showFeedback(c);
      exerciseScores.push(currentExercise.score);
      aelaTTS.speak('Danke für deine Antwort! Plus ' + currentExercise.score + ' Punkte');
    }

    function enableNextButton() { document.getElementById('next-btn').disabled = false; }
    function nextExercise() { currentTaskIndex < tasks.length - 1 ? loadTask(currentTaskIndex + 1) : finishModule(); }
    function previousExercise() { if (currentTaskIndex > 0) loadTask(currentTaskIndex - 1); }

    function finishModule() {
      const total = exerciseScores.reduce((a, b) => a + b, 0);
      const max = tasks.reduce((s, t) => s + t.basePoints, 0);
      const percent = Math.round((total / max) * 100);
      aelaCore.completeModule('spielanleitung', percent);
      aelaCore.addXP(total);
      const qr = aelaqr.generateResultQR('Spielanleitung & Gedicht', percent);
      document.getElementById('exercise-container').innerHTML = aelaqr.createResultCard('Spielanleitung & Gedicht', percent, qr.uuid, qr.qrImageURL);
      document.getElementById('prev-btn').hidden = true;
      document.getElementById('next-btn').innerHTML = '🏠 Startseite';
      document.getElementById('next-btn').disabled = false;
      document.getElementById('next-btn').onclick = () => window.location.href = '../';
      aelaTTS.speak(`Wunderbar! Modul fertig! ${percent} Prozent, ${total} Punkte!`);
    }

    window.addEventListener('load', loadTasks);
  </script>
</body>
</html>
